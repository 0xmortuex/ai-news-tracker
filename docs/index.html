<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Tracker · 0xmortuex</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-elev: #121212;
    --bg-card: #161616;
    --border: #232323;
    --border-strong: #2e2e2e;
    --text: #e8e3d8;
    --text-dim: #8a8678;
    --text-faint: #5a5750;
    --accent: #d4a574;
    --accent-dim: #6b5638;
    --us: #5b8def;
    --cn: #e2615b;
    --other: #9b9b9b;
    --ok: #6fbf73;
    --err: #d4615b;
    --serif: 'Fraunces', 'Times New Roman', serif;
    --mono: 'JetBrains Mono', 'Consolas', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: var(--serif); }
  body {
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% -10%, rgba(212, 165, 116, 0.06), transparent 50%),
      radial-gradient(circle at 90% 110%, rgba(91, 141, 239, 0.04), transparent 50%);
    background-attachment: fixed;
  }

  ::selection { background: var(--accent); color: var(--bg); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent-dim); }

  /* === HEADER === */
  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(10, 10, 10, 0.85);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  .brand h1 {
    font-family: var(--serif);
    font-weight: 800;
    font-size: 26px;
    letter-spacing: -0.02em;
    font-variation-settings: "opsz" 144;
  }

  .brand h1 span { color: var(--accent); font-style: italic; font-weight: 400; }

  .brand .tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    padding: 3px 8px;
    border: 1px solid var(--border-strong);
    border-radius: 2px;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .header-stats .stat strong {
    color: var(--text);
    font-family: var(--mono);
    font-weight: 600;
  }

  .header-actions { display: flex; gap: 10px; }

  button {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 14px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: transparent; color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* === LAYOUT === */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px;
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 32px;
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; padding: 20px; }
    .sidebar { position: static !important; }
  }

  /* === SIDEBAR === */
  .sidebar {
    position: sticky;
    top: 90px;
    align-self: start;
    height: calc(100vh - 110px);
    overflow-y: auto;
    padding-right: 8px;
  }

  .filter-group {
    margin-bottom: 28px;
  }

  .filter-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 11px;
    margin: 0 4px 6px 0;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s ease;
  }

  .chip:hover { border-color: var(--accent-dim); color: var(--text); }
  .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(212, 165, 116, 0.06); }
  .chip .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-faint);
  }
  .chip[data-c="US"] .dot { background: var(--us); }
  .chip[data-c="CN"] .dot { background: var(--cn); }
  .chip[data-c="OTHER"] .dot { background: var(--other); }

  /* Search */
  .search {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--text-faint); }

  /* === SOURCE STATUS === */
  .source-list {
    font-family: var(--mono);
    font-size: 10px;
    line-height: 1.7;
  }
  .source-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    color: var(--text-dim);
    border-bottom: 1px dotted var(--border);
  }
  .source-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .source-row .count { color: var(--text-faint); }
  .source-row .icon {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
    background: var(--text-faint);
  }
  .source-row.ok .icon { background: var(--ok); box-shadow: 0 0 6px rgba(111, 191, 115, 0.4); }
  .source-row.err .icon { background: var(--err); }
  .source-row.loading .icon { background: var(--accent); animation: pulse 1.2s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* === MAIN === */
  .main h2 {
    font-family: var(--serif);
    font-weight: 800;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-faint);
    margin-bottom: 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .main h2 .count {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* === ARTICLE CARDS === */
  .articles { display: flex; flex-direction: column; gap: 18px; }

  .article {
    padding: 20px 24px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-strong);
    border-radius: 2px;
    transition: all 0.2s ease;
    position: relative;
  }
  .article:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
    background: var(--bg-elev);
  }
  .article[data-c="US"] { border-left-color: var(--us); }
  .article[data-c="CN"] { border-left-color: var(--cn); }
  .article[data-c="OTHER"] { border-left-color: var(--other); }
  .article.read { opacity: 0.45; }

  .article-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 10px;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
  }
  .article-meta .source-name { color: var(--accent); font-weight: 500; }
  .article-meta .country-pill {
    padding: 2px 7px;
    border: 1px solid currentColor;
    border-radius: 2px;
    font-size: 9px;
  }
  .article-meta .country-pill.US { color: var(--us); }
  .article-meta .country-pill.CN { color: var(--cn); }
  .article-meta .country-pill.OTHER { color: var(--other); }
  .article-meta .new-badge {
    background: var(--accent);
    color: var(--bg);
    padding: 2px 7px;
    font-weight: 600;
    border-radius: 2px;
  }

  .article h3 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 19px;
    line-height: 1.32;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
    font-variation-settings: "opsz" 30;
  }
  .article h3 a {
    color: var(--text);
    text-decoration: none;
    background-image: linear-gradient(to right, var(--accent), var(--accent));
    background-position: 0 100%;
    background-size: 0% 1px;
    background-repeat: no-repeat;
    transition: background-size 0.3s ease, color 0.15s ease;
    padding-bottom: 1px;
  }
  .article h3 a:hover {
    color: var(--accent);
    background-size: 100% 1px;
  }
  .article p {
    color: var(--text-dim);
    font-size: 14px;
    line-height: 1.55;
    font-family: var(--serif);
    font-variation-settings: "opsz" 14;
  }

  /* === STATES === */
  .empty, .loading-screen {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
  }
  .empty .big {
    font-family: var(--serif);
    font-size: 32px;
    color: var(--text);
    margin-bottom: 12px;
    font-style: italic;
    font-weight: 400;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--bg-elev);
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 24px;
    font-family: var(--mono);
    font-size: 12px;
    border-radius: 2px;
    z-index: 100;
    transition: transform 0.3s ease;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.err { border-color: var(--err); }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 0%, var(--bg-elev) 50%, var(--bg-card) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 2px;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  footer {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-faint);
    font-family: var(--mono);
    font-size: 10px;
    border-top: 1px solid var(--border);
    margin-top: 60px;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <h1>AI News<span>·</span>Tracker</h1>
      <span class="tag">live · 0xmortuex</span>
    </div>
    <div class="header-stats">
      <div class="stat"><strong id="stat-articles">0</strong> articles</div>
      <div class="stat"><strong id="stat-sources">0/0</strong> sources</div>
      <div class="stat"><strong id="stat-updated">—</strong></div>
    </div>
    <div class="header-actions">
      <button id="btn-mark-read" title="Mark all read">Mark Read</button>
      <button id="btn-refresh" class="primary">↻ Refresh</button>
    </div>
  </div>
</header>

<div class="container">

  <aside class="sidebar">
    <div class="filter-group">
      <div class="filter-label">Search</div>
      <input class="search" id="q" placeholder="filter by title…" type="text">
    </div>

    <div class="filter-group">
      <div class="filter-label">Region</div>
      <div id="filter-country">
        <span class="chip active" data-f="country" data-v="all">all</span>
        <span class="chip" data-f="country" data-v="US" data-c="US"><span class="dot"></span>USA</span>
        <span class="chip" data-f="country" data-v="CN" data-c="CN"><span class="dot"></span>China</span>
        <span class="chip" data-f="country" data-v="OTHER" data-c="OTHER"><span class="dot"></span>Global</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Type</div>
      <div id="filter-type">
        <span class="chip active" data-f="type" data-v="all">all</span>
        <span class="chip" data-f="type" data-v="COMPANY">company</span>
        <span class="chip" data-f="type" data-v="NEWS">news</span>
        <span class="chip" data-f="type" data-v="RESEARCH">research</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Show Read</div>
      <div id="filter-read">
        <span class="chip active" data-f="read" data-v="unread">unread only</span>
        <span class="chip" data-f="read" data-v="all">all</span>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Source Status</div>
      <div class="source-list" id="source-status"></div>
    </div>
  </aside>

  <main class="main">
    <h2>The Feed <span class="count" id="visible-count">—</span></h2>
    <div class="articles" id="articles">
      <div class="loading-screen">Loading saved articles…</div>
    </div>
  </main>

</div>

<footer>
  Built by <a href="https://github.com/0xmortuex" target="_blank" rel="noopener">0xmortuex</a> ·
  <a href="https://github.com/0xmortuex/ai-news-tracker" target="_blank" rel="noopener">source</a> ·
  no servers, no tracking, all in your browser
</footer>

<div class="toast" id="toast"></div>

<script>
// =========================================================================
// CONFIG
// =========================================================================
const SOURCES = [
  { name: "OpenAI",          url: "https://openai.com/news/rss.xml",                         country: "US",    type: "COMPANY" },
  { name: "DeepMind",        url: "https://deepmind.google/blog/rss.xml",                    country: "US",    type: "COMPANY" },
  { name: "Google Research", url: "https://research.google/blog/rss/",                       country: "US",    type: "COMPANY" },
  { name: "Microsoft AI",    url: "https://blogs.microsoft.com/ai/feed/",                    country: "US",    type: "COMPANY" },
  { name: "NVIDIA",          url: "https://blogs.nvidia.com/feed/",                          country: "US",    type: "COMPANY" },
  { name: "Hugging Face",    url: "https://huggingface.co/blog/feed.xml",                    country: "US",    type: "COMPANY" },
  { name: "BAIR Berkeley",   url: "https://bair.berkeley.edu/blog/feed.xml",                 country: "US",    type: "RESEARCH" },
  { name: "TechCrunch AI",   url: "https://techcrunch.com/category/artificial-intelligence/feed/", country: "US", type: "NEWS" },
  { name: "MIT Tech Review", url: "https://www.technologyreview.com/topic/artificial-intelligence/feed", country: "US", type: "NEWS" },
  { name: "Ars Technica AI", url: "https://arstechnica.com/ai/feed/",                        country: "US",    type: "NEWS" },
  { name: "VentureBeat AI",  url: "https://venturebeat.com/category/ai/feed/",               country: "US",    type: "NEWS" },
  { name: "SCMP Tech",       url: "https://www.scmp.com/rss/36/feed",                        country: "CN",    type: "NEWS" },
  { name: "TechNode",        url: "https://technode.com/feed/",                              country: "CN",    type: "NEWS" },
  { name: "arXiv cs.AI",     url: "http://export.arxiv.org/rss/cs.AI",                       country: "OTHER", type: "RESEARCH" },
  { name: "arXiv cs.LG",     url: "http://export.arxiv.org/rss/cs.LG",                       country: "OTHER", type: "RESEARCH" },
  { name: "Anthropic (Google News)",         url: "https://news.google.com/rss/search?q=site:anthropic.com+when:14d&hl=en-US&gl=US&ceid=US:en",                    country: "US", type: "COMPANY" },
  { name: "Meta AI (Google News)",           url: "https://news.google.com/rss/search?q=site:ai.meta.com+when:14d&hl=en-US&gl=US&ceid=US:en",                      country: "US", type: "COMPANY" },
  { name: "The Verge AI (Google News)",      url: "https://news.google.com/rss/search?q=site:theverge.com+%22artificial+intelligence%22+when:7d&hl=en-US&gl=US&ceid=US:en", country: "US", type: "NEWS" },
  { name: "China AI Industry (Google News)", url: "https://news.google.com/rss/search?q=china+%22artificial+intelligence%22+when:3d&hl=en-US&gl=US&ceid=US:en",    country: "CN", type: "NEWS" },
  { name: "Caixin AI (Google News)",         url: "https://news.google.com/rss/search?q=site:caixinglobal.com+ai+when:14d&hl=en-US&gl=US&ceid=US:en",              country: "CN", type: "NEWS" },
];

// CORS proxy chain — try in order. If one fails, fall back to the next.
const PROXIES = [
  {
    name: "own-worker",
    url: (feed) => `https://ai-news-cors.mortuexhavoc.workers.dev/?url=${encodeURIComponent(feed)}`,
    parse: async (resp) => parseRSSText(await resp.text()),
  },
  {
    name: "codetabs",
    url: (feed) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(feed)}`,
    parse: async (resp) => parseRSSText(await resp.text()),
  },
  {
    name: "allorigins",
    url: (feed) => `https://api.allorigins.win/raw?url=${encodeURIComponent(feed)}`,
    parse: async (resp) => parseRSSText(await resp.text()),
  },
];

const STORAGE_KEY = "ai-news-articles-v2";
const READ_KEY    = "ai-news-read-v2";
const META_KEY    = "ai-news-meta-v2";

// =========================================================================
// STATE
// =========================================================================
let articles = loadJSON(STORAGE_KEY, []);
let readSet  = new Set(loadJSON(READ_KEY, []));
let meta     = loadJSON(META_KEY, { lastFetch: null, sourceStatus: {} });
let filters  = { country: "all", type: "all", read: "unread", q: "" };

// =========================================================================
// HELPERS
// =========================================================================
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.warn(e); }
}
function stripHTML(s) {
  const div = document.createElement("div");
  div.innerHTML = s;
  return (div.textContent || "").replace(/\s+/g, " ").trim();
}
function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function relTime(d) {
  const ms = Date.now() - d.getTime();
  const m = Math.floor(ms / 60000);
  if (m < 1) return "just now";
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  const days = Math.floor(h / 24);
  if (days < 30) return days + "d ago";
  return d.toLocaleDateString();
}
function articleId(art) {
  return art.url || (art.title + "::" + art.source);
}

function parseRSSText(text) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, "application/xml");
  if (doc.querySelector("parsererror")) throw new Error("XML parse error");
  // RSS 2.0
  let items = Array.from(doc.querySelectorAll("item"));
  if (items.length > 0) {
    return items.slice(0, 30).map(it => ({
      title:   (it.querySelector("title")?.textContent || "").trim(),
      url:     (it.querySelector("link")?.textContent  || "").trim(),
      summary: stripHTML(it.querySelector("description")?.textContent || "").slice(0, 280),
      date:    it.querySelector("pubDate") ? new Date(it.querySelector("pubDate").textContent) : new Date(),
    }));
  }
  // Atom
  items = Array.from(doc.querySelectorAll("entry"));
  return items.slice(0, 30).map(it => ({
    title:   (it.querySelector("title")?.textContent || "").trim(),
    url:     (it.querySelector("link")?.getAttribute("href") || "").trim(),
    summary: stripHTML(it.querySelector("summary")?.textContent || it.querySelector("content")?.textContent || "").slice(0, 280),
    date:    it.querySelector("published") || it.querySelector("updated")
             ? new Date((it.querySelector("published") || it.querySelector("updated")).textContent)
             : new Date(),
  }));
}

// =========================================================================
// FETCH
// =========================================================================
async function fetchSource(src) {
  setSourceStatus(src.name, "loading", "fetching…");
  for (const proxy of PROXIES) {
    try {
      const url = proxy.url(src.url);
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 12000);
      const resp = await fetch(url, { signal: ctrl.signal });
      clearTimeout(timer);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const items = await proxy.parse(resp);
      const tagged = items.filter(i => i.url && i.title).map(i => ({
        ...i,
        date: i.date instanceof Date && !isNaN(i.date) ? i.date.toISOString() : new Date().toISOString(),
        source: src.name,
        country: src.country,
        type: src.type,
      }));
      setSourceStatus(src.name, "ok", `${tagged.length} via ${proxy.name}`);
      return tagged;
    } catch (err) {
      console.warn(`[${src.name}] ${proxy.name} failed:`, err.message);
      // try next proxy
    }
  }
  setSourceStatus(src.name, "err", "all proxies failed");
  return [];
}

async function fetchAll() {
  const btn = document.getElementById("btn-refresh");
  btn.disabled = true;
  btn.textContent = "↻ Fetching…";

  // Reset all source status to loading
  SOURCES.forEach(s => setSourceStatus(s.name, "loading", "queued"));

  // Run in parallel, max 4 at a time so we don't hammer proxies
  const queue = [...SOURCES];
  const allNew = [];
  const concurrency = 4;
  let okCount = 0;

  async function worker() {
    while (queue.length) {
      const src = queue.shift();
      const items = await fetchSource(src);
      if (items.length > 0) okCount++;
      allNew.push(...items);
      updateSourceStatusUI();
    }
  }

  await Promise.all(Array(concurrency).fill(0).map(worker));

  // Dedupe by URL, merge with existing
  const existingByUrl = new Map(articles.map(a => [a.url, a]));
  let added = 0;
  for (const item of allNew) {
    if (!existingByUrl.has(item.url)) {
      existingByUrl.set(item.url, item);
      added++;
    }
  }
  articles = Array.from(existingByUrl.values())
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .slice(0, 1000);

  meta.lastFetch = new Date().toISOString();
  saveJSON(STORAGE_KEY, articles);
  saveJSON(META_KEY, meta);

  btn.disabled = false;
  btn.textContent = "↻ Refresh";

  toast(`+${added} new · ${okCount}/${SOURCES.length} sources ok`);
  render();
}

// =========================================================================
// UI: SOURCE STATUS
// =========================================================================
function setSourceStatus(name, state, message) {
  meta.sourceStatus[name] = { state, message, at: new Date().toISOString() };
}

function updateSourceStatusUI() {
  const el = document.getElementById("source-status");
  if (!el) return;
  el.innerHTML = SOURCES.map(s => {
    const st = meta.sourceStatus[s.name] || { state: "", message: "—" };
    return `<div class="source-row ${st.state}">
      <span class="icon"></span>
      <span class="name">${escapeHTML(s.name)}</span>
      <span class="count">${escapeHTML(st.message || "")}</span>
    </div>`;
  }).join("");

  const ok = SOURCES.filter(s => meta.sourceStatus[s.name]?.state === "ok").length;
  document.getElementById("stat-sources").textContent = `${ok}/${SOURCES.length}`;
}

// =========================================================================
// UI: ARTICLES
// =========================================================================
function render() {
  // Filter
  let visible = articles.filter(a => {
    if (filters.country !== "all" && a.country !== filters.country) return false;
    if (filters.type    !== "all" && a.type    !== filters.type)    return false;
    if (filters.read === "unread" && readSet.has(articleId(a)))     return false;
    if (filters.q && !a.title.toLowerCase().includes(filters.q.toLowerCase())) return false;
    return true;
  });

  visible = visible.slice(0, 200);

  const el = document.getElementById("articles");
  if (visible.length === 0) {
    if (articles.length === 0) {
      el.innerHTML = `<div class="empty">
        <div class="big">empty.</div>
        <div>Press <strong>Refresh</strong> in the header to fetch articles.</div>
      </div>`;
    } else {
      el.innerHTML = `<div class="empty">
        <div class="big">no matches.</div>
        <div>Try adjusting filters or clearing search.</div>
      </div>`;
    }
  } else {
    el.innerHTML = visible.map(a => {
      const id = articleId(a);
      const isRead = readSet.has(id);
      const isNew = (Date.now() - new Date(a.date).getTime()) < 60 * 60 * 1000;
      return `
        <article class="article ${isRead ? 'read' : ''}" data-c="${a.country}">
          <div class="article-meta">
            <span class="country-pill ${a.country}">${a.country === "OTHER" ? "GLOBAL" : a.country}</span>
            <span class="source-name">${escapeHTML(a.source)}</span>
            <span>${relTime(new Date(a.date))}</span>
            ${isNew ? `<span class="new-badge">NEW</span>` : ""}
          </div>
          <h3>
            <a href="${escapeHTML(a.url)}" target="_blank" rel="noopener" data-id="${escapeHTML(id)}">
              ${escapeHTML(a.title)}
            </a>
          </h3>
          ${a.summary ? `<p>${escapeHTML(a.summary)}</p>` : ""}
        </article>`;
    }).join("");

    el.querySelectorAll("a[data-id]").forEach(a => {
      a.addEventListener("click", () => {
        readSet.add(a.dataset.id);
        saveJSON(READ_KEY, [...readSet]);
        a.closest(".article").classList.add("read");
        updateStats();
      });
    });
  }

  // Stats
  document.getElementById("visible-count").textContent = `${visible.length} of ${articles.length}`;
  updateStats();
  updateSourceStatusUI();
}

function updateStats() {
  const unread = articles.filter(a => !readSet.has(articleId(a))).length;
  document.getElementById("stat-articles").textContent = `${unread}/${articles.length}`;
  if (meta.lastFetch) {
    document.getElementById("stat-updated").textContent = relTime(new Date(meta.lastFetch));
  } else {
    document.getElementById("stat-updated").textContent = "never";
  }
}

// =========================================================================
// FILTERS
// =========================================================================
document.querySelectorAll(".chip[data-f]").forEach(chip => {
  chip.addEventListener("click", () => {
    const f = chip.dataset.f, v = chip.dataset.v;
    document.querySelectorAll(`.chip[data-f="${f}"]`).forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    filters[f] = v;
    render();
  });
});

document.getElementById("q").addEventListener("input", (e) => {
  filters.q = e.target.value.trim();
  render();
});

document.getElementById("btn-refresh").addEventListener("click", fetchAll);

document.getElementById("btn-mark-read").addEventListener("click", () => {
  articles.forEach(a => readSet.add(articleId(a)));
  saveJSON(READ_KEY, [...readSet]);
  toast(`Marked ${articles.length} read`);
  render();
});

// =========================================================================
// TOAST
// =========================================================================
let toastTimer;
function toast(msg, isErr = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.toggle("err", isErr);
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3500);
}

// =========================================================================
// INIT
// =========================================================================
(function init() {
  // Pre-populate source status from saved meta if present
  SOURCES.forEach(s => {
    if (!meta.sourceStatus[s.name]) {
      meta.sourceStatus[s.name] = { state: "", message: "not yet fetched" };
    }
  });

  render();

  // Auto-fetch on first visit (no articles yet)
  if (articles.length === 0) {
    setTimeout(() => fetchAll(), 400);
  }
})();
</script>

</body>
</html>
