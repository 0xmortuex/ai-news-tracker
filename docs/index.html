<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: #0f0f10;
    color: #e5e5e5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  }
  .card {
    background: #1a1a1c;
    border: 1px solid #2a2a2d;
    transition: transform 0.15s ease, border-color 0.15s ease;
  }
  .card:hover {
    border-color: #4a4a4d;
    transform: translateY(-2px);
  }
  .badge-us    { background: #1e40af20; color: #60a5fa; border: 1px solid #1e40af40; }
  .badge-cn    { background: #b91c1c20; color: #f87171; border: 1px solid #b91c1c40; }
  .badge-other { background: #4b556320; color: #9ca3af; border: 1px solid #4b556340; }
  .badge-company  { background: #15803d20; color: #4ade80; }
  .badge-news     { background: #c2410c20; color: #fb923c; }
  .badge-research { background: #7c3aed20; color: #a78bfa; }
  .badge-new {
    background: #ef4444;
    color: white;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  select, input {
    background: #1a1a1c;
    border: 1px solid #2a2a2d;
    color: #e5e5e5;
  }
  select:focus, input:focus {
    border-color: #6366f1;
    outline: none;
  }
  .read { opacity: 0.5; }
  .toast {
    position: fixed;
    top: 1rem;
    right: 1rem;
    background: #1a1a1c;
    border: 1px solid #4ade80;
    color: #4ade80;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    z-index: 50;
    transition: opacity 0.3s ease;
  }
  .toast.error {
    border-color: #f87171;
    color: #f87171;
  }
  .spinner {
    display: inline-block;
    width: 1rem;
    height: 1rem;
    border: 2px solid #6366f1;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  header.sticky-header {
    position: sticky;
    top: 0;
    z-index: 30;
    background: #0f0f10;
    padding-top: 1rem;
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid #2a2a2d;
  }
</style>
</head>
<body class="min-h-screen">
<div class="max-w-7xl mx-auto px-4 py-4">
  <header class="sticky-header">
    <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
      <div>
        <h1 class="text-3xl font-bold">AI News Tracker</h1>
        <p class="text-gray-400 text-sm">Latest AI developments from US, China, and global research</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-sm text-gray-400">
          <span id="unreadCount" class="text-white font-semibold">0</span> unread /
          <span id="totalCount">0</span> total
        </div>
        <button id="refreshBtn"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded text-sm font-medium flex items-center gap-2">
          <span id="refreshLabel">Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <div class="card rounded-lg p-4 mb-4">
    <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
      <input type="text" id="searchInput" placeholder="Search titles..." class="rounded px-3 py-2 col-span-2">
      <select id="countryFilter" class="rounded px-3 py-2">
        <option value="">All countries</option>
        <option value="US">🇺🇸 USA</option>
        <option value="CN">🇨🇳 China</option>
        <option value="OTHER">🌐 Global</option>
      </select>
      <select id="typeFilter" class="rounded px-3 py-2">
        <option value="">All types</option>
        <option value="COMPANY">Company blogs</option>
        <option value="NEWS">News sites</option>
        <option value="RESEARCH">Research</option>
      </select>
      <select id="sourceFilter" class="rounded px-3 py-2">
        <option value="">All sources</option>
      </select>
    </div>
    <div class="flex items-center justify-between mt-3">
      <label class="flex items-center text-sm text-gray-400 cursor-pointer">
        <input type="checkbox" id="showRead" class="mr-2"> Show read articles
      </label>
      <button id="markAllReadBtn" class="text-xs text-gray-400 hover:text-white">
        Mark all as read
      </button>
    </div>
  </div>

  <div id="loadingState" class="card rounded-lg p-12 text-center hidden">
    <div class="spinner mx-auto mb-4"></div>
    <p class="text-gray-400" id="loadingText">Fetching feeds...</p>
  </div>

  <div id="emptyState" class="card rounded-lg p-12 text-center hidden">
    <p class="text-gray-400 mb-4">No articles match your filters.</p>
  </div>

  <div id="articleList" class="space-y-3"></div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
// ========== Configuration ==========
const SOURCES = [
  { name: "OpenAI News",            url: "https://openai.com/news/rss.xml",                                              country: "US",    type: "COMPANY",  domain: "openai.com" },
  { name: "Anthropic News",         url: "https://www.anthropic.com/news/feed.xml",                                       country: "US",    type: "COMPANY",  domain: "anthropic.com" },
  { name: "Google DeepMind",        url: "https://deepmind.google/blog/rss.xml",                                          country: "US",    type: "COMPANY",  domain: "deepmind.google" },
  { name: "Google Research",        url: "https://research.google/blog/rss/",                                             country: "US",    type: "COMPANY",  domain: "research.google" },
  { name: "Meta AI",                url: "https://ai.meta.com/blog/rss/",                                                 country: "US",    type: "COMPANY",  domain: "ai.meta.com" },
  { name: "Microsoft AI Blog",      url: "https://blogs.microsoft.com/ai/feed/",                                          country: "US",    type: "COMPANY",  domain: "microsoft.com" },
  { name: "NVIDIA Blog",            url: "https://blogs.nvidia.com/feed/",                                                country: "US",    type: "COMPANY",  domain: "nvidia.com" },
  { name: "Hugging Face Blog",      url: "https://huggingface.co/blog/feed.xml",                                          country: "US",    type: "COMPANY",  domain: "huggingface.co" },
  { name: "BAIR Berkeley AI",       url: "https://bair.berkeley.edu/blog/feed.xml",                                       country: "US",    type: "RESEARCH", domain: "berkeley.edu" },
  { name: "TechCrunch AI",          url: "https://techcrunch.com/category/artificial-intelligence/feed/",                 country: "US",    type: "NEWS",     domain: "techcrunch.com" },
  { name: "The Verge AI",           url: "https://www.theverge.com/ai-artificial-intelligence/rss/index.xml",            country: "US",    type: "NEWS",     domain: "theverge.com" },
  { name: "MIT Tech Review AI",     url: "https://www.technologyreview.com/topic/artificial-intelligence/feed",          country: "US",    type: "NEWS",     domain: "technologyreview.com" },
  { name: "Ars Technica AI",        url: "https://arstechnica.com/ai/feed/",                                              country: "US",    type: "NEWS",     domain: "arstechnica.com" },
  { name: "VentureBeat AI",         url: "https://venturebeat.com/category/ai/feed/",                                     country: "US",    type: "NEWS",     domain: "venturebeat.com" },
  { name: "South China Morning Post", url: "https://www.scmp.com/rss/36/feed",                                            country: "CN",    type: "NEWS",     domain: "scmp.com" },
  { name: "TechNode",               url: "https://technode.com/feed/",                                                    country: "CN",    type: "NEWS",     domain: "technode.com" },
  { name: "China Daily Tech",       url: "https://www.chinadaily.com.cn/rss/business_rss.xml",                            country: "CN",    type: "NEWS",     domain: "chinadaily.com.cn" },
  { name: "Caixin Global",          url: "https://www.caixinglobal.com/feed/",                                            country: "CN",    type: "NEWS",     domain: "caixinglobal.com" },
  { name: "arXiv cs.AI",            url: "http://export.arxiv.org/rss/cs.AI",                                             country: "OTHER", type: "RESEARCH", domain: "arxiv.org" },
  { name: "arXiv cs.LG",            url: "http://export.arxiv.org/rss/cs.LG",                                             country: "OTHER", type: "RESEARCH", domain: "arxiv.org" },
];

// CORS proxy — turns RSS XML into JSON usable from the browser
const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";

// ========== State ==========
let articles = [];
const STORAGE_KEY = "ai-news-articles-v1";
const READ_KEY = "ai-news-read-v1";
let readSet = new Set(JSON.parse(localStorage.getItem(READ_KEY) || "[]"));

// ========== Storage ==========
function saveArticles() {
  // Keep only last 1000 to avoid localStorage bloat
  const trimmed = articles.slice(0, 1000);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
}
function loadArticles() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return [];
  try { return JSON.parse(raw); } catch { return []; }
}
function saveRead() {
  localStorage.setItem(READ_KEY, JSON.stringify([...readSet]));
}

// ========== Toast ==========
function toast(msg, isError = false) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "toast" + (isError ? " error" : "");
  el.classList.remove("hidden");
  setTimeout(() => el.classList.add("hidden"), 3500);
}

// ========== Fetch ==========
async function fetchSource(source) {
  try {
    const res = await fetch(RSS_PROXY + encodeURIComponent(source.url));
    if (!res.ok) return [];
    const data = await res.json();
    if (data.status !== "ok" || !data.items) return [];
    return data.items.map(item => ({
      id: item.link,
      title: item.title,
      url: item.link,
      summary: (item.description || "").replace(/<[^>]+>/g, "").slice(0, 400),
      published: item.pubDate ? new Date(item.pubDate).getTime() : Date.now(),
      source: source.name,
      country: source.country,
      type: source.type,
      domain: source.domain,
    }));
  } catch (err) {
    console.warn(`Failed to fetch ${source.name}:`, err);
    return [];
  }
}

async function fetchAll() {
  const btn = document.getElementById("refreshBtn");
  const label = document.getElementById("refreshLabel");
  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span> Fetching...';
  document.getElementById("loadingState").classList.remove("hidden");
  document.getElementById("articleList").innerHTML = "";

  let totalNew = 0;
  let succeeded = 0;
  const existingIds = new Set(articles.map(a => a.id));

  // Fetch in parallel batches of 5 to avoid overwhelming the proxy
  for (let i = 0; i < SOURCES.length; i += 5) {
    const batch = SOURCES.slice(i, i + 5);
    document.getElementById("loadingText").textContent =
      `Fetching ${i + batch.length}/${SOURCES.length} sources...`;
    const results = await Promise.all(batch.map(fetchSource));
    results.forEach(items => {
      if (items.length > 0) succeeded++;
      items.forEach(item => {
        if (!existingIds.has(item.id)) {
          articles.push(item);
          existingIds.add(item.id);
          totalNew++;
        }
      });
    });
  }

  // Sort by date desc
  articles.sort((a, b) => b.published - a.published);
  saveArticles();
  document.getElementById("loadingState").classList.add("hidden");
  populateSourceFilter();
  render();

  btn.disabled = false;
  label.textContent = "Refresh";

  if (succeeded === 0) {
    toast("Could not fetch any feeds. Try again later.", true);
  } else {
    toast(`Fetched ${totalNew} new articles from ${succeeded}/${SOURCES.length} sources`);
  }
}

// ========== Render ==========
function timeAgo(ms) {
  const diff = Date.now() - ms;
  const min = Math.floor(diff / 60000);
  if (min < 1) return "just now";
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 30) return `${day}d ago`;
  return new Date(ms).toLocaleDateString();
}

function flag(country) {
  if (country === "US") return "🇺🇸 USA";
  if (country === "CN") return "🇨🇳 China";
  return "🌐 Global";
}

function typeLabel(type) {
  return { COMPANY: "Company", NEWS: "News", RESEARCH: "Research" }[type] || type;
}

function favicon(domain) {
  return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
}

function render() {
  const country = document.getElementById("countryFilter").value;
  const type = document.getElementById("typeFilter").value;
  const source = document.getElementById("sourceFilter").value;
  const query = document.getElementById("searchInput").value.toLowerCase().trim();
  const showRead = document.getElementById("showRead").checked;

  let filtered = articles;
  if (country) filtered = filtered.filter(a => a.country === country);
  if (type) filtered = filtered.filter(a => a.type === type);
  if (source) filtered = filtered.filter(a => a.source === source);
  if (query) filtered = filtered.filter(a =>
    a.title.toLowerCase().includes(query) || (a.summary || "").toLowerCase().includes(query)
  );
  if (!showRead) filtered = filtered.filter(a => !readSet.has(a.id));

  filtered = filtered.slice(0, 200);

  document.getElementById("totalCount").textContent = articles.length;
  document.getElementById("unreadCount").textContent =
    articles.filter(a => !readSet.has(a.id)).length;

  const list = document.getElementById("articleList");
  const empty = document.getElementById("emptyState");

  if (filtered.length === 0) {
    list.innerHTML = "";
    empty.classList.remove("hidden");
    if (articles.length === 0) {
      empty.innerHTML = `<p class="text-gray-400 mb-4">No articles yet.</p>
        <p class="text-sm text-gray-500">Click <strong>Refresh</strong> to fetch the latest AI news.</p>`;
    } else {
      empty.innerHTML = `<p class="text-gray-400">No articles match your filters.</p>`;
    }
    return;
  }
  empty.classList.add("hidden");

  const oneHourAgo = Date.now() - 60 * 60 * 1000;

  list.innerHTML = filtered.map(a => {
    const isRead = readSet.has(a.id);
    const isNew = a.published > oneHourAgo;
    return `
      <article class="card rounded-lg p-4 ${isRead ? "read" : ""}">
        <div class="flex items-start gap-3">
          <img src="${favicon(a.domain)}" alt="" class="w-5 h-5 mt-1 flex-shrink-0 rounded" loading="lazy"
               onerror="this.style.display='none'">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-2 flex-wrap">
              <span class="text-xs px-2 py-0.5 rounded badge-${a.country.toLowerCase()}">${flag(a.country)}</span>
              <span class="text-xs px-2 py-0.5 rounded badge-${a.type.toLowerCase()}">${typeLabel(a.type)}</span>
              <span class="text-xs text-gray-500">${escapeHtml(a.source)}</span>
              <span class="text-xs text-gray-500">· ${timeAgo(a.published)}</span>
              ${isNew ? '<span class="text-xs px-2 py-0.5 rounded badge-new font-bold">NEW</span>' : ""}
            </div>
            <h2 class="text-lg font-semibold mb-1 leading-snug">
              <a href="${escapeAttr(a.url)}" target="_blank" rel="noopener noreferrer"
                 onclick="markRead('${escapeAttr(a.id)}')"
                 class="hover:text-indigo-400 transition-colors">
                ${escapeHtml(a.title)}
              </a>
            </h2>
            ${a.summary ? `<p class="text-sm text-gray-400 line-clamp-2">${escapeHtml(a.summary)}</p>` : ""}
          </div>
        </div>
      </article>
    `;
  }).join("");
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function escapeAttr(str) {
  return escapeHtml(str);
}

// ========== Actions ==========
function markRead(id) {
  readSet.add(id);
  saveRead();
  setTimeout(render, 100);
}

function markAllRead() {
  articles.forEach(a => readSet.add(a.id));
  saveRead();
  render();
}

function populateSourceFilter() {
  const sel = document.getElementById("sourceFilter");
  const current = sel.value;
  const names = [...new Set(articles.map(a => a.source))].sort();
  sel.innerHTML = '<option value="">All sources</option>' +
    names.map(n => `<option value="${escapeAttr(n)}">${escapeHtml(n)}</option>`).join("");
  if (names.includes(current)) sel.value = current;
}

// ========== Init ==========
articles = loadArticles();
populateSourceFilter();
render();

document.getElementById("refreshBtn").addEventListener("click", fetchAll);
document.getElementById("markAllReadBtn").addEventListener("click", markAllRead);
["countryFilter", "typeFilter", "sourceFilter", "showRead"].forEach(id =>
  document.getElementById(id).addEventListener("change", render));
document.getElementById("searchInput").addEventListener("input", render);

// Auto-fetch on first load if no articles cached
if (articles.length === 0) {
  fetchAll();
}
</script>
</body>
</html>
